services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
    volumes:
      - shared-data:/app/shared
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/health']
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  telegram-bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    environment:
      API_URL: http://api:3001
      API_TOKEN: changeme
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - '3002:3002'
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  video-worker:
    build:
      context: .
      dockerfile: Dockerfile.video
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MINIO_ENDPOINT: minio
      MINIO_PORT: '9000'
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_USE_SSL: 'false'
      MINIO_BUCKET: instapost-images
      MINIO_PUBLIC_URL: http://localhost:9000
      SCRIPTS_DIR: /app
      YT_COOKIES_PATH: /app/shared/cookies.txt
    volumes:
      - shared-data:/app/shared
    depends_on:
      minio:
        condition: service_healthy
    restart: unless-stopped

volumes:
  miniodata:
  shared-data:

networks:
  default:
    name: coolify
    external: true
