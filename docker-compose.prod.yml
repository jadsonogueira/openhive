services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: instapost
      POSTGRES_USER: instapost
      POSTGRES_PASSWORD: instapost2026prod
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U instapost']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - instapost

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass instapost2026prod
    volumes:
      - redisdata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'instapost2026prod', 'ping']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - instapost

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: instapostminio
      MINIO_ROOT_PASSWORD: instapost2026minio
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - miniodata:/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - instapost

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - instapost

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
    ports:
      - '3000:3000'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - instapost

  telegram-bot:
    build:
      context: .
      dockerfile: packages/bot/Dockerfile
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - instapost

  mcp-server:
    build:
      context: .
      dockerfile: packages/mcp/Dockerfile
    ports:
      - '3002:3002'
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - instapost

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  instapost:
    driver: bridge
